services:
  postgres:
    image: postgres:17-alpine
    container_name: tgt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgt_db
      POSTGRES_USER: tgt
      POSTGRES_PASSWORD: tgt_password
    ports:
      - "5432:5432"
    volumes:
      - tgt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgt -d tgt_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tgt_postgres_data:
